name: Build Installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which installer to build
        type: choice
        default: juce
        options:
          - both
          - iplug2
          - juce
      asio_sdk_url:
        description: Direct download URL for the Steinberg ASIO SDK zip
        type: string
        default: https://www.steinberg.net/asiosdk
      build_macos:
        description: Include macOS build
        type: boolean
        default: true

jobs:
  build-installer-iplug2:
    name: Build iPlug2 Installer
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'iplug2' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: core/ui/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Configure CMake
        run: cmake -S iplug2/src -B src/build

      - name: Build UI
        working-directory: core/ui
        run: npm ci

      - name: Build UI bundle
        working-directory: core/ui
        run: npm run build

      - name: Build VST3 and App
        run: cmake --build src/build --config Release --target SoundshedGuitar_VST3 SoundshedGuitar_App --parallel

      - name: Build Installer
        run: cmake --build src/build --config Release --target SoundshedGuitar_Installer --parallel

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Soundshed Guitar-iPlug2-Installer
          path: installer/dist/*.exe

      - name: Check R2 configuration (iPlug2)
        id: r2-check-iplug2
        shell: pwsh
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:R2_ACCESS_KEY_ID) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_SECRET_ACCESS_KEY) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_BUCKET) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_ACCOUNT_ID)
          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "R2 upload enabled for iPlug2 installer"
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "R2 upload disabled (missing one or more required secrets)"
          }

      - name: Configure AWS credentials for R2 (iPlug2)
        if: steps.r2-check-iplug2.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload iPlug2 installer to R2
        if: steps.r2-check-iplug2.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $endpoint = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          $bucket = "${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          $prefix = "installers/iplug2/${{ github.ref_name }}/${{ github.run_number }}"

          Get-ChildItem -Path "installer/dist" -Filter "*.exe" | ForEach-Object {
            $key = "$prefix/$($_.Name)"
            aws s3 cp $_.FullName "s3://$bucket/$key" --endpoint-url $endpoint --only-show-errors
            Write-Host "Uploaded to r2://$bucket/$key"
          }

  build-installer-juce:
    name: Build JUCE Installer
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'juce' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: core/ui/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build UI
        working-directory: core/ui
        run: npm ci

      - name: Build UI bundle
        working-directory: core/ui
        run: npm run build

      - name: Cache JUCE source
        id: cache-juce-source
        uses: actions/cache@v4
        with:
          path: juce/JUCE
          key: ${{ runner.os }}-juce-source-v2

      - name: Fetch JUCE source
        shell: pwsh
        run: |
          if ("${{ steps.cache-juce-source.outputs.cache-hit }}" -eq "true") {
            Write-Host "JUCE source restored from cache"
          } elseif (Test-Path "juce/JUCE/CMakeLists.txt") {
            Write-Host "JUCE source already present at juce/JUCE"
          } else {
            git clone --depth 1 https://github.com/juce-framework/JUCE.git juce/JUCE
          }

      - name: Install WebView2 NuGet package
        shell: pwsh
        run: |
          $packageVersion = "1.0.3485.44"

          if (-Not (Get-PackageSource -Name "nugetRepository" -ErrorAction SilentlyContinue)) {
            Register-PackageSource -ProviderName NuGet -Name nugetRepository -Location "https://www.nuget.org/api/v2" -Trusted -Force
          }

          Install-Package Microsoft.Web.WebView2 -Scope CurrentUser -RequiredVersion $packageVersion -Source nugetRepository -Force

          $candidateRoots = @(
            (Join-Path $env:USERPROFILE "AppData/Local/PackageManagement/NuGet/Packages"),
            (Join-Path $env:USERPROFILE ".nuget/packages")
          )

          $webViewPackageDir = $null
          foreach ($root in $candidateRoots) {
            if (-Not (Test-Path $root)) {
              continue
            }

            $found = Get-ChildItem -Path $root -Directory -Filter "*Microsoft.Web.WebView2*" -ErrorAction SilentlyContinue |
              Where-Object { Test-Path (Join-Path $_.FullName "build/native/include/WebView2.h") } |
              Select-Object -First 1

            if ($found) {
              $webViewPackageDir = $found.FullName
              break
            }
          }

          if (-Not $webViewPackageDir) {
            throw "WebView2 package directory was not found after installation."
          }

          $webViewPackageLocation = Split-Path -Path $webViewPackageDir -Parent
          "WEBVIEW2_PACKAGE_LOCATION=$webViewPackageLocation" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WEBVIEW2_ROOT_DIR=$webViewPackageDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using WebView2 package location: $webViewPackageLocation"
          Write-Host "Using WebView2 root dir: $webViewPackageDir"

      - name: Cache ASIO SDK
        id: cache-asio-sdk
        uses: actions/cache@v4
        with:
          path: .cache/asio-sdk
          key: ${{ runner.os }}-asio-sdk-v1

      - name: Fetch ASIO SDK
        shell: pwsh
        run: |
          $downloadUrl = "${{ github.event.inputs.asio_sdk_url }}"
          $zipPath = Join-Path $env:RUNNER_TEMP "asio-sdk.zip"
          $extractDir = Join-Path $env:GITHUB_WORKSPACE ".cache/asio-sdk"

          if ("${{ steps.cache-asio-sdk.outputs.cache-hit }}" -eq "true") {
            Write-Host "ASIO SDK restored from cache"
          } else {
            if (Test-Path $extractDir) {
              Remove-Item -Path $extractDir -Recurse -Force
            }

            New-Item -Path $extractDir -ItemType Directory -Force | Out-Null

            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -MaximumRedirection 10

            try {
              Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
            } catch {
              throw "Failed to extract ASIO SDK zip from '$downloadUrl'. Provide a direct .zip download URL from Steinberg."
            }
          }

          $asioSdkDir = Get-ChildItem -Path $extractDir -Directory -Recurse |
            Where-Object { $_.Name -eq "ASIOSDK" } |
            Select-Object -First 1

          if (-Not $asioSdkDir) {
            throw "ASIOSDK folder not found in extracted archive from '$downloadUrl'."
          }

          "ASIO_SDK_DIR=$($asioSdkDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Detected ASIO SDK at $($asioSdkDir.FullName)"

      - name: Configure JUCE CMake
        shell: pwsh
        run: cmake -S juce -B juce/Builds -DGUITARFX_ASIO_SDK_DIR="$env:ASIO_SDK_DIR" -DJUCE_WEBVIEW2_PACKAGE_LOCATION="$env:WEBVIEW2_PACKAGE_LOCATION" -DWebView2_root_dir="$env:WEBVIEW2_ROOT_DIR"

      - name: Build JUCE Release
        run: cmake --build juce/Builds --config Release --parallel

      - name: Export JUCE build env
        shell: pwsh
        run: |
          if (-Not (Test-Path "juce/.env")) {
            throw "Expected juce/.env after configure, but it was not found."
          }
          Get-Content "juce/.env" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build JUCE Installer
        working-directory: juce
        run: iscc "packaging\installer.iss"

      - name: Upload JUCE Installer
        uses: actions/upload-artifact@v4
        with:
          name: Soundshed Guitar-JUCE-Installer
          path: juce/packaging/Output/*.exe

      - name: Check R2 configuration (JUCE)
        id: r2-check-juce
        shell: pwsh
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:R2_ACCESS_KEY_ID) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_SECRET_ACCESS_KEY) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_BUCKET) -and `
                     -not [string]::IsNullOrWhiteSpace($env:R2_ACCOUNT_ID)
          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "R2 upload enabled for JUCE installer"
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "R2 upload disabled (missing one or more required secrets)"
          }

      - name: Configure AWS credentials for R2 (JUCE)
        if: steps.r2-check-juce.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload JUCE installer to R2
        if: steps.r2-check-juce.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $endpoint = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          $bucket = "${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          $prefix = "installers/juce/${{ github.ref_name }}/${{ github.run_number }}"

          Get-ChildItem -Path "juce/packaging/Output" -Filter "*.exe" | ForEach-Object {
            $key = "$prefix/$($_.Name)"
            aws s3 cp $_.FullName "s3://$bucket/$key" --endpoint-url $endpoint --only-show-errors
            Write-Host "Uploaded to r2://$bucket/$key"
          }

  build-juce-macos-dmg:
    name: Build JUCE macOS (${{ matrix.variant }})
    if: ${{ (github.event.inputs.target == 'both' || github.event.inputs.target == 'juce') && inputs.build_macos }}
    runs-on: macos-latest
    env:
      DMG_NAME: ""
      DMG_PATH: ""
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: arm64-check
            cmake_architectures: arm64
            package_dmg: false
          - variant: universal
            cmake_architectures: arm64;x86_64
            package_dmg: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: core/ui/package-lock.json

      - name: Build UI
        working-directory: core/ui
        run: npm ci

      - name: Build UI bundle
        working-directory: core/ui
        run: npm run build

      - name: Cache JUCE source
        id: cache-juce-source-macos
        uses: actions/cache@v4
        with:
          path: juce/JUCE
          key: ${{ runner.os }}-juce-source-v2

      - name: Fetch JUCE source
        run: |
          if [ "${{ steps.cache-juce-source-macos.outputs.cache-hit }}" = "true" ]; then
            echo "JUCE source restored from cache"
          elif [ -f "juce/JUCE/CMakeLists.txt" ]; then
            echo "JUCE source already present at juce/JUCE"
          else
            git clone --depth 1 https://github.com/juce-framework/JUCE.git juce/JUCE
          fi

      - name: Configure JUCE CMake
        run: cmake -S juce -B juce/builds -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_architectures }}"

      - name: Build JUCE Standalone + Plugin Release
        run: cmake --build juce/builds --config Release --target SoundshedGuitar_Standalone SoundshedGuitar_VST3 SoundshedGuitar_AU SoundshedGuitar_CLAP --parallel

      - name: Export JUCE build env
        run: |
          if [ ! -f "juce/.env" ]; then
            echo "Expected juce/.env after configure, but it was not found."
            exit 1
          fi
          cat juce/.env >> "$GITHUB_ENV"

      - name: Validate macOS bundles and UI resources
        run: |
          ARTEFACTS_BASE="juce/builds/${PROJECT_NAME}_artefacts/Release"
          STANDALONE_PATH="$ARTEFACTS_BASE/Standalone/${PRODUCT_NAME}.app"
          VST3_PATH="$ARTEFACTS_BASE/VST3/${PRODUCT_NAME}.vst3"
          AU_PATH="$ARTEFACTS_BASE/AU/${PRODUCT_NAME}.component"
          CLAP_PATH="$ARTEFACTS_BASE/CLAP/${PRODUCT_NAME}.clap"

          for bundle in "$STANDALONE_PATH" "$VST3_PATH" "$AU_PATH"; do
            if [ ! -d "$bundle" ]; then
              echo "Required macOS bundle not found: $bundle"
              exit 1
            fi
          done

          for bundle in "$STANDALONE_PATH" "$VST3_PATH" "$AU_PATH"; do
            if [ ! -f "$bundle/Contents/Resources/ui/index.html" ]; then
              echo "Missing bundled UI resources in $bundle"
              exit 1
            fi
          done

          if [ -d "$CLAP_PATH" ]; then
            if [ ! -f "$CLAP_PATH/Contents/Resources/ui/index.html" ]; then
              echo "Missing bundled UI resources in $CLAP_PATH"
              exit 1
            fi
          fi

          echo "STANDALONE_PATH=$STANDALONE_PATH" >> "$GITHUB_ENV"
          echo "VST3_PATH=$VST3_PATH" >> "$GITHUB_ENV"
          echo "AU_PATH=$AU_PATH" >> "$GITHUB_ENV"
          if [ -d "$CLAP_PATH" ]; then
            echo "CLAP_PATH=$CLAP_PATH" >> "$GITHUB_ENV"
          fi

      - name: Create DMG
        if: ${{ matrix.package_dmg }}
        run: |
          STAGING_DIR="${RUNNER_TEMP}/dmg-root"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/Plug-Ins/VST3"
          mkdir -p "$STAGING_DIR/Plug-Ins/Components"

          cp -R "$STANDALONE_PATH" "$STAGING_DIR/"
          cp -R "$VST3_PATH" "$STAGING_DIR/Plug-Ins/VST3/"
          cp -R "$AU_PATH" "$STAGING_DIR/Plug-Ins/Components/"

          if [ -n "${CLAP_PATH:-}" ] && [ -d "$CLAP_PATH" ]; then
            mkdir -p "$STAGING_DIR/Plug-Ins/CLAP"
            cp -R "$CLAP_PATH" "$STAGING_DIR/Plug-Ins/CLAP/"
          fi

          DMG_NAME="${PRODUCT_NAME}-${VERSION}-macOS.dmg"
          DMG_PATH="${RUNNER_TEMP}/${DMG_NAME}"
          hdiutil create -volname "${PRODUCT_NAME}" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload macOS DMG
        if: ${{ matrix.package_dmg }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}

      - name: Check R2 configuration (macOS)
        if: ${{ matrix.package_dmg }}
        id: r2-check-macos
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$R2_ACCESS_KEY_ID" ] && [ -n "$R2_SECRET_ACCESS_KEY" ] && [ -n "$R2_BUCKET" ] && [ -n "$R2_ACCOUNT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "R2 upload enabled for macOS DMG"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "R2 upload disabled (missing one or more required secrets)"
          fi

      - name: Configure AWS credentials for R2 (macOS)
        if: ${{ matrix.package_dmg && steps.r2-check-macos.outputs.enabled == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload macOS DMG to R2
        if: ${{ matrix.package_dmg && steps.r2-check-macos.outputs.enabled == 'true' }}
        run: |
          ENDPOINT="https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          KEY="installers/macos/${{ github.ref_name }}/${{ github.run_number }}/${DMG_NAME}"
          aws s3 cp "$DMG_PATH" "s3://$BUCKET/$KEY" --endpoint-url "$ENDPOINT" --only-show-errors
          echo "Uploaded to r2://$BUCKET/$KEY"
