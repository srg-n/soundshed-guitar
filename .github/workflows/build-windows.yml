on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:GUITARFX_WINDOWS_CMAKE_GENERATOR = 'Visual Studio 17 2022'
          .\build_windows.bat '${{ matrix.arch }}'

      - name: Resolve installer path
        id: installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem -Path '.\juce\packaging\Output' -Filter '*.exe' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw 'No Windows installer .exe found in juce\packaging\Output'
          }
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content '.\juce\VERSION' -Raw).Trim()
          $assetName = "SoundshedGuitar-$version-Windows-${{ matrix.arch }}-setup.exe"
          $assetPath = Join-Path $PWD $assetName
          Copy-Item '${{ steps.installer.outputs.installer_path }}' $assetPath -Force
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-installer
          path: ${{ steps.asset.outputs.asset_path }}
          if-no-files-found: error
