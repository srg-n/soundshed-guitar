name: Build Windows

on:
  workflow_dispatch:
    
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    env:
      R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:GUITARFX_WINDOWS_CMAKE_GENERATOR = 'Visual Studio 18 2026'
          .\build_windows.bat '${{ matrix.arch }}'

      - name: Resolve installer path
        id: installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem -Path '.\juce\packaging\Output' -Filter '*.exe' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw 'No Windows installer .exe found in juce\\packaging\\Output'
          }

          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Authenticate to Google Cloud
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Sign installer with Google KMS
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' && secrets.WINDOWS_SIGNING_CERT_CHAIN_PEM_B64 != '' }}
        shell: pwsh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_KMS_LOCATION: ${{ secrets.GCP_KMS_LOCATION }}
          GCP_KMS_KEYRING: ${{ secrets.GCP_KMS_KEYRING }}
          GCP_KMS_KEY: ${{ secrets.GCP_KMS_KEY }}
          GCP_KMS_KEY_VERSION: ${{ secrets.GCP_KMS_KEY_VERSION }}
          WINDOWS_SIGNING_CERT_CHAIN_PEM_B64: ${{ secrets.WINDOWS_SIGNING_CERT_CHAIN_PEM_B64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://github.com/ebourg/jsign/releases/download/7.4/jsign-7.4.jar' -OutFile '.\jsign.jar'
          [IO.File]::WriteAllBytes('.\codesign-chain.pem', [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_CHAIN_PEM_B64))

          $keystore = "projects/$env:GCP_PROJECT_ID/locations/$env:GCP_KMS_LOCATION/keyRings/$env:GCP_KMS_KEYRING/cryptoKeys/$env:GCP_KMS_KEY"
          $installerPath = '${{ steps.installer.outputs.installer_path }}'

          & java -jar .\jsign.jar `
            --storetype GOOGLECLOUD `
            --keystore "$keystore" `
            --alias "$env:GCP_KMS_KEY_VERSION" `
            --certfile .\codesign-chain.pem `
            --tsaurl http://timestamp.digicert.com `
            "$installerPath"

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content '.\juce\VERSION' -Raw).Trim()
          $assetName = "SoundshedGuitar-$version-Windows-${{ matrix.arch }}-setup.exe"
          $assetPath = Join-Path $PWD $assetName
          Copy-Item '${{ steps.installer.outputs.installer_path }}' $assetPath -Force

          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}-installer
          path: ${{ steps.asset.outputs.asset_path }}
          if-no-files-found: error

      - name: Install Wrangler
        if: ${{ env.R2_BUCKET != '' }}
        shell: pwsh
        run: npm install -g wrangler@4

      - name: Upload artifact to Cloudflare R2
        if: ${{ env.R2_BUCKET != '' }}
        shell: pwsh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $key = "builds/${{ github.ref_name }}/${{ github.run_id }}/windows/${{ matrix.arch }}/${{ steps.asset.outputs.asset_name }}"
          wrangler r2 object put "$env:R2_BUCKET/$key" --file "${{ steps.asset.outputs.asset_path }}"
