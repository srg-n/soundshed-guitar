name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.4.0)'
        required: true
      release_name:
        description: 'Release display name'
        required: true
      prerelease:
        description: 'Mark as prerelease'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Download latest Windows x64 artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build-windows.yml
          workflow_conclusion: success
          branch: main
          name: windows-x64-installer
          path: release-assets/windows-x64

      - name: Download latest Windows arm64 artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build-windows.yml
          workflow_conclusion: success
          branch: main
          name: windows-arm64-installer
          path: release-assets/windows-arm64

      - name: Download latest macOS artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build-macos.yml
          workflow_conclusion: success
          branch: main
          name: macos-universal-pkg
          path: release-assets/macos

      - name: Download latest Linux x64 artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build-linux.yml
          workflow_conclusion: success
          branch: main
          name: linux-x64-zip
          path: release-assets/linux-x64

      - name: Download latest Linux arm64 artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build-linux.yml
          workflow_conclusion: success
          branch: main
          name: linux-arm64-zip
          path: release-assets/linux-arm64

      - name: Generate checksums
        run: |
          set -euo pipefail
          find release-assets -type f -maxdepth 4 -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.pkg
            release-assets/**/*.zip
            release-assets/SHA256SUMS.txt
