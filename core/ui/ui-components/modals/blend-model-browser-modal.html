<div id="blend-model-browser-modal" class="modal" style="display: none;">
      <div class="modal-content blend-model-browser-modal" role="dialog" aria-modal="true" aria-labelledby="blend-model-browser-title">
        <div class="modal-header">
          <h3 id="blend-model-browser-title">Select Model</h3>
          <button class="modal-close" id="blend-model-browser-close">×</button>
        </div>
        <div class="modal-body">
          <div class="blend-model-browser-summary">
            <span>Default tone group: <strong id="blend-model-browser-group">—</strong></span>
          </div>
          <div class="blend-model-browser-filters">
            <input type="text" id="blend-model-browser-search" placeholder="Search models..." />
            <select id="blend-model-browser-scope">
              <option value="group" selected>Current tone group</option>
              <option value="all">All models</option>
            </select>
            <select id="blend-model-browser-category">
              <option value="all" selected>All types</option>
            </select>
          </div>
          <div id="blend-model-browser-list" class="blend-model-browser-list"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="blend-model-browser-cancel">Cancel</button>
        </div>
      </div>
    </div>
