<div id="resource-browser-modal" class="modal resource-browser-modal" style="display: none;">
      <div class="modal-content resource-browser-modal-content" role="dialog" aria-modal="true" aria-labelledby="resource-browser-title">
        <div class="modal-header">
          <h3 id="resource-browser-title">Select Resource</h3>
          <button class="modal-close" id="resource-browser-close">×</button>
        </div>
        <div class="modal-body">
          <!-- Tab buttons -->
          <div class="resource-browser-tabs">
            <button class="resource-browser-tab-btn tab-btn tab-btn-underline active" data-tab="library" type="button">Resource Library</button>
            <button class="resource-browser-tab-btn tab-btn tab-btn-underline" data-tab="folder" type="button">Folder</button>
            <button class="resource-browser-tab-btn tab-btn tab-btn-underline" data-tab="tone3000" type="button">Tone 3000</button>
          </div>
          
          <!-- Library Tab Panel -->
          <div class="resource-browser-tab-panel active" data-tab-panel="library">
            <div class="resource-browser-filters">
              <input type="text" id="resource-browser-library-search" placeholder="Search models..." />
              <select id="resource-browser-library-category">
                <option value="all">All Categories</option>
              </select>
              <select id="resource-browser-library-architecture">
                <option value="all">All Architectures</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
              </select>
              <select id="resource-browser-library-creator">
                <option value="all">All Creators</option>
              </select>
              <div class="resource-browser-library-favorites-tabs" role="tablist" aria-label="Favourite filter">
                <button class="resource-browser-library-favorites-tab active" id="resource-browser-library-favorites-all" type="button" aria-pressed="true">All</button>
                <button class="resource-browser-library-favorites-tab" id="resource-browser-library-favorites-only" type="button" aria-pressed="false">Favourites</button>
              </div>
              <div class="resource-browser-library-nav" aria-label="Browse selected resource">
                <button class="preset-action-btn resource-browser-nav-btn" id="resource-browser-library-prev" type="button" title="Previous resource" aria-label="Previous resource" disabled>
                  <span class="resource-nav-icon" style="--icon-url: url('/images/icons/chevron-left.svg')" aria-hidden="true"></span>
                </button>
                <button class="preset-action-btn resource-browser-nav-btn" id="resource-browser-library-next" type="button" title="Next resource" aria-label="Next resource" disabled>
                  <span class="resource-nav-icon" style="--icon-url: url('/images/icons/chevron-right.svg')" aria-hidden="true"></span>
                </button>
              </div>
              <button class="btn btn-secondary" id="resource-browser-library-browse" type="button">File...</button>
            </div>
            <div class="resource-browser-tag-filter-bar preset-tag-filter-bar" id="resource-browser-library-tag-filters"></div>
            <div id="resource-browser-library-list" class="results results--compact resource-browser-list"></div>
          </div>

          <!-- Folder Tab Panel -->
          <div class="resource-browser-tab-panel" data-tab-panel="folder">
            <div class="resource-browser-filters resource-browser-folder-toolbar">
              <select id="resource-browser-folder-root" title="Saved folders">
                <option value="">No folder selected</option>
              </select>
              <button class="btn btn-secondary" id="resource-browser-folder-add" type="button" title="Add a folder">+ Add Folder</button>
              <button class="resource-browser-action-icon-btn resource-browser-folder-remove-btn" id="resource-browser-folder-remove" type="button" title="Remove the selected folder" aria-label="Remove folder">🗑️</button>
              <input type="text" id="resource-browser-folder-search" placeholder="Filter files..." />
            </div>
            <div class="resource-browser-folder-breadcrumb">
              <button class="btn btn-secondary" id="resource-browser-folder-up" type="button" title="Up one level">↑ Up</button>
              <span id="resource-browser-folder-path" class="resource-browser-folder-path"></span>
            </div>
            <div class="resource-browser-tag-filter-bar preset-tag-filter-bar" id="resource-browser-folder-tag-filters"></div>
            <div id="resource-browser-folder-status" class="resource-browser-status"></div>
            <div id="resource-browser-folder-list" class="results results--compact resource-browser-list resource-browser-folder-list"></div>
          </div>
          
          <!-- Tone3000 Tab Panel -->
          <div class="resource-browser-tab-panel" data-tab-panel="tone3000">
            <div class="resource-browser-tone3000-mode-tabs">
              <button class="resource-browser-tone3000-mode-tab active" id="resource-browser-tone3000-mode-search-tab" type="button" aria-pressed="true">Search</button>
              <button class="resource-browser-tone3000-mode-tab" id="resource-browser-tone3000-mode-favorites-tab" type="button" aria-pressed="false" title="Favorites are available only when using your own Tone3000 API key">Favourites</button>
            </div>
            <div class="resource-browser-filters" id="resource-browser-tone3000-search-controls">
              <input type="text" id="resource-browser-tone3000-search" placeholder="Search amps and pedals..." />
              <button class="btn btn-secondary" id="resource-browser-tone3000-search-btn" type="button">Search</button>
              <select id="resource-browser-tone3000-category">
                <option value="amp" selected>Amps</option>
                <option value="pedal">Pedals (FX)</option>
                <option value="preamp">Preamps</option>
                <option value="full-rig">Full Rigs</option>
              </select>
              <select id="resource-browser-tone3000-sort">
                <option value="popular" selected>Popular</option>
                <option value="recent">Recent</option>
                <option value="trending">Trending</option>
              </select>
              <select id="resource-browser-tone3000-architecture">
                <option value="2" selected>A2</option>
                <option value="1">A1</option>
                <option value="custom">Custom</option>
                <option value="all">Any Architecture</option>
              </select>
            </div>
            <div id="resource-browser-tone3000-status" class="resource-browser-status"></div>
            <div id="resource-browser-tone3000-list" class="results results--compact resource-browser-list resource-browser-tone3000-list"></div>
            <div id="resource-browser-tone3000-pagination" class="resource-browser-pagination">
             <button class="resource-browser-page-btn" id="resource-browser-tone3000-prev" type="button">
               <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
               Prev
             </button>
             <span id="resource-browser-tone3000-page-label">Page 1</span>
             <button class="resource-browser-page-btn" id="resource-browser-tone3000-next" type="button">
               Next
               <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
             </button>
            </div>
          </div>

          <div id="resource-browser-edit-popover" class="resource-browser-edit-popover" hidden>
            <div class="resource-browser-edit-popover-card" role="dialog" aria-modal="true" aria-labelledby="resource-browser-edit-title">
              <div class="resource-browser-edit-popover-header">
                <h4 id="resource-browser-edit-title">Edit resource</h4>
              </div>
              <div class="resource-browser-edit-popover-body">
                <label for="resource-browser-edit-name">Name</label>
                <input id="resource-browser-edit-name" type="text" placeholder="Resource name" />
                <label for="resource-browser-edit-category">Category</label>
                <input id="resource-browser-edit-category" type="text" placeholder="Category" />
                <label for="resource-browser-edit-tags">Tags</label>
                <input id="resource-browser-edit-tags" type="text" placeholder="Comma-separated tags" />
              </div>
              <div class="resource-browser-edit-popover-actions">
                <button class="btn btn-secondary" id="resource-browser-edit-cancel" type="button">Cancel</button>
                <button class="btn btn-primary" id="resource-browser-edit-save" type="button">Save</button>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="resource-browser-cancel">Cancel</button>
          <button class="btn btn-primary" id="resource-browser-select" disabled>OK</button>
        </div>
      </div>
    </div>
