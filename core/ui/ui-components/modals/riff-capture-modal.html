<div id="riff-capture-modal" class="modal riff-capture-modal" style="display: none;">
      <div class="modal-content riff-capture-modal-content">
        <div class="modal-header">
          <h3>New Riff</h3>
          <span class="riff-rec-indicator" aria-hidden="true">● REC</span>
          <button id="riff-capture-modal-close" class="modal-close" type="button">&times;</button>
        </div>
        <div class="modal-body">
          <div class="riff-capture-tabs preset-modal-tabs" role="tablist" aria-label="Riff capture settings tabs">
            <button class="riff-capture-tab-btn tab-btn active" data-riff-capture-tab="main" type="button">Main</button>
            <button class="riff-capture-tab-btn tab-btn" data-riff-capture-tab="advanced" type="button">Advanced</button>
          </div>
          <div class="riff-capture-tab-panel active" data-riff-capture-tab-panel="main">
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-tempo">Tempo</label>
              <input type="number" id="riff-capture-tempo" min="30" max="300" step="1" value="120" />
              <span class="settings-unit">BPM</span>
              <button id="riff-sync-metronome-btn" type="button" class="secondary riff-sync-metro-btn" title="Copy current metronome tempo">↩ Metro</button>
            </div>
            <div class="settings-row riff-capture-row">
              <label>Status</label>
              <span id="riff-capture-status" class="settings-unit">Idle</span>
            </div>
          </div>
          <div class="riff-capture-tab-panel" data-riff-capture-tab-panel="advanced">
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-timesig-num">Time Signature</label>
              <div class="riff-timesig-inline">
                <input type="number" id="riff-capture-timesig-num" min="1" max="16" step="1" value="4" />
                <span>/</span>
                <input type="number" id="riff-capture-timesig-den" min="1" max="16" step="1" value="4" />
              </div>
              <span class="settings-unit" id="riff-capture-bars-display">— bars</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-pattern-type">Pattern</label>
              <select id="riff-capture-pattern-type">
                <option value="click" selected>Click</option>
                <option value="drum">Drum (MIDI)</option>
              </select>
              <span class="settings-unit">pattern id</span>
              <input type="text" id="riff-capture-pattern-id" placeholder="e.g. rock_4_4_01" />
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-countin">Count-in</label>
              <input type="number" id="riff-capture-countin" min="0" max="8" step="1" value="1" />
              <span class="settings-unit">bars</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-metro-volume">Click Volume</label>
              <input type="range" id="riff-capture-metro-volume" min="-60" max="6" step="1" value="-12" />
              <span class="settings-unit" id="riff-capture-metro-volume-label">-12 dB</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-enable-click">Metronome Click</label>
              <label class="settings-checkbox">
                <input type="checkbox" id="riff-capture-enable-click" checked />
                <span>Play click during count-in, capture, and riff preview</span>
              </label>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-accent">Beat Pattern</label>
              <input type="text" id="riff-capture-accent" maxlength="16" placeholder="LHLH" title="H=High L=Low S=Silent" />
              <span class="settings-unit">H=High L=Low S=Silent</span>
            </div>
          </div>
          <div class="settings-row">
            <label>Actions</label>
            <div class="riff-capture-actions">
              <button id="riff-capture-record-toggle" type="button">● Record</button>
              <button id="riff-capture-play" type="button" class="secondary">▶</button>
            </div>
          </div>
          <div class="settings-row">
            <label>Trim + Loop</label>
            <div class="riff-trim-controls">
              <span class="settings-unit">Start</span>
              <span class="settings-unit" id="riff-trim-start-label">0.00s</span>
              <span class="settings-unit">End</span>
              <span class="settings-unit" id="riff-trim-end-label">0.00s</span>
              <label class="toggle-switch">
                <input type="checkbox" id="riff-capture-repeat" />
                <span class="toggle-slider"></span>
              </label>
              <span class="settings-unit">Repeat</span>
              <button id="riff-capture-trim" type="button" class="secondary">Crop To Markers</button>
            </div>
          </div>
          <div class="riff-waveform-wrap">
            <canvas id="riff-capture-waveform" class="riff-capture-waveform" width="640" height="120" tabindex="0" aria-label="Riff trim waveform"></canvas>
          </div>
          <div class="settings-hint">Drag the vertical trim markers in the waveform to set loop/crop start and end.</div>
          <div id="riff-capture-save-section" class="riff-capture-save-section" style="display: none;">
            <div class="riff-capture-save-divider">Save Take</div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-save-title">Title</label>
              <input type="text" id="riff-capture-save-title" placeholder="Palm-muted verse riff" />
              <label class="toggle-switch">
                <input type="checkbox" id="riff-capture-save-favorite" />
                <span class="toggle-slider"></span>
              </label>
              <span class="settings-unit">Fav</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-save-categories">Categories</label>
              <input type="text" id="riff-capture-save-categories" placeholder="metal, rhythm" />
              <span class="settings-unit">CSV</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-save-tags">Tags</label>
              <input type="text" id="riff-capture-save-tags" placeholder="drop C, tight, intro" />
              <span class="settings-unit">CSV</span>
            </div>
            <div class="settings-row riff-capture-row">
              <label for="riff-capture-save-notes">Notes</label>
              <input type="text" id="riff-capture-save-notes" placeholder="Works with modern high-gain presets" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="riff-capture-modal-cancel" class="secondary" type="button">Cancel</button>
          <button id="riff-capture-modal-save-take" type="button" disabled>Save Take</button>
        </div>
      </div>
    </div>
