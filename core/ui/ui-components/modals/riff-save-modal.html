<div id="riff-save-modal" class="modal riff-save-modal" style="display: none;">
      <div class="modal-content riff-save-modal-content">
        <div class="modal-header">
          <h3 id="riff-save-modal-title">Save Take</h3>
          <button id="riff-save-modal-close" class="modal-close" type="button">&times;</button>
        </div>
        <div class="modal-body">
          <div class="settings-row">
            <label for="riff-save-title">Title</label>
            <input type="text" id="riff-save-title" placeholder="Palm-muted verse riff" />
            <label class="toggle-switch">
              <input type="checkbox" id="riff-save-favorite" />
              <span class="toggle-slider"></span>
            </label>
            <span class="settings-unit">Favorite</span>
          </div>
          <div class="settings-row">
            <label for="riff-save-categories">Categories</label>
            <input type="text" id="riff-save-categories" placeholder="metal, rhythm" />
            <span class="settings-unit">CSV</span>
          </div>
          <div class="settings-row">
            <label for="riff-save-tags">Tags</label>
            <input type="text" id="riff-save-tags" placeholder="drop C, tight, intro" />
            <span class="settings-unit">CSV</span>
          </div>
          <div class="settings-row">
            <label for="riff-save-notes">Notes</label>
            <input type="text" id="riff-save-notes" placeholder="Works with modern high-gain presets" />
          </div>
        </div>
        <div class="modal-footer">
          <button id="riff-save-modal-cancel" class="secondary" type="button">Cancel</button>
          <button id="riff-save-modal-confirm" type="button">Save Take</button>
        </div>
      </div>
    </div>
