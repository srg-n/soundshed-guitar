<div id="save-preset-modal" class="modal save-preset-modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="save-preset-modal-title">Save Preset</h3>
          <button class="modal-close" id="save-preset-modal-close">×</button>
        </div>
        <div class="modal-body">
          <div class="preset-modal-tabs tab-bar">
            <button class="preset-modal-tab-btn tab-btn active" data-preset-modal-tab="details" type="button">Details</button>
            <button class="preset-modal-tab-btn tab-btn" data-preset-modal-tab="advanced" type="button">Advanced</button>
          </div>
          <div class="preset-modal-tab-panel active" data-preset-modal-tab-panel="details">
            <div class="form-group">
              <label for="preset-folder-select">Save Folder</label>
              <select id="preset-folder-select" class="themed-select"></select>
            </div>
            <div class="form-group">
              <label for="preset-name-input">Preset Name</label>
              <input type="text" id="preset-name-input" placeholder="My Custom Preset" />
            </div>
            <div class="form-group">
              <label for="preset-category-input">Category</label>
              <input type="text" id="preset-category-input" placeholder="User" value="User" />
            </div>
            <div class="form-group">
              <label for="preset-description-input">Description</label>
              <textarea id="preset-description-input" placeholder="Optional description..." rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Tags</label>
              <div class="preset-tags-picker" id="preset-tags-picker">
                <button type="button" class="preset-tag-chip" data-tag="lead">lead</button>
                <button type="button" class="preset-tag-chip" data-tag="rhythm">rhythm</button>
                <button type="button" class="preset-tag-chip" data-tag="clean">clean</button>
                <button type="button" class="preset-tag-chip" data-tag="crunch">crunch</button>
                <button type="button" class="preset-tag-chip" data-tag="high-gain">high-gain</button>
                <button type="button" class="preset-tag-chip" data-tag="ambient">ambient</button>
                <button type="button" class="preset-tag-chip" data-tag="atmospheric">atmospheric</button>
              </div>
            </div>
            <div class="form-group preset-peak-info">
              <label>Input Peak Level</label>
              <div class="preset-peak-grid">
                <span class="preset-peak-col-label">Raw Input Peak (10s)</span>
                <span id="preset-modal-raw-peak" class="preset-peak-col-value">—</span>
                <span class="preset-peak-col-label">Designed Peak</span>
                <div class="preset-peak-action-cell">
                  <span id="preset-modal-designed-peak" class="preset-peak-col-value">—</span>
                  <button type="button" class="btn btn-secondary btn-sm" id="preset-modal-apply-peak">Apply Current</button>
                </div>
              </div>
            </div>
          </div>
          <div class="preset-modal-tab-panel" data-preset-modal-tab-panel="advanced">
            <div class="form-group">
              <label>Preset JSON (read-only)</label>
              <div class="preset-advanced-actions">
                <button class="btn btn-secondary" id="preset-json-validate" type="button">Validate</button>
                <button class="btn btn-secondary" id="preset-json-cleanup" type="button">Clean Up</button>
              </div>
              <pre class="preset-json-report" id="preset-json-report"></pre>
              <div class="preset-advanced-json" aria-label="Preset JSON">
                <pre id="preset-json-view" style="user-select: all;"></pre>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="save-preset-cancel">Cancel</button>
          <button class="btn btn-primary" id="save-preset-confirm">Save Preset</button>
        </div>
      </div>
    </div>
