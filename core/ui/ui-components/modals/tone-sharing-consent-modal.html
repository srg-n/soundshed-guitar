<div id="tone-sharing-consent-modal" class="modal" style="display: none;">
      <div class="modal-content tone-sharing-signin-modal-content">
        <div class="modal-header">
          <h3>Share Preset Terms</h3>
          <button id="tone-sharing-consent-close" class="modal-close" type="button">×</button>
        </div>
        <div class="modal-body">
          <p>Community presets are published under the Creative Commons CC-0 Open Data license. By continuing, you confirm you are allowed to share this preset and agree that the Soundshed app and related services may store and use the preset resources and metadata you upload.</p>
          <label class="tone-sharing-select-item">
            <input id="tone-sharing-consent-checkbox" type="checkbox" />
            <span>I agree to publish this preset under CC0 and allow Soundshed to store the uploaded preset resources and metadata.</span>
          </label>
          <div class="tone-sharing-status" id="tone-sharing-consent-status"></div>
        </div>
        <div class="modal-footer">
          <button id="tone-sharing-consent-cancel" type="button" class="btn btn-secondary">Cancel</button>
          <button id="tone-sharing-consent-accept" type="button" class="btn btn-primary" disabled>Agree and Continue</button>
        </div>
      </div>
    </div>
