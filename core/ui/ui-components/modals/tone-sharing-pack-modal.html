<div id="tone-sharing-pack-modal" class="modal" style="display: none;">
      <div class="modal-content tone-sharing-pack-modal-content">
        <div class="modal-header">
          <h3 id="tone-sharing-pack-modal-title">Create Pack</h3>
          <button id="tone-sharing-pack-modal-close" class="modal-close" type="button">×</button>
        </div>
        <div class="modal-body">
          <div class="tone-sharing-grid-form">
            <label for="tone-sharing-pack-title">Pack Title</label>
            <input id="tone-sharing-pack-title" type="text" placeholder="Modern Metal Essentials" />
            <label for="tone-sharing-pack-description">Description</label>
            <textarea id="tone-sharing-pack-description" rows="2" placeholder="Short pack description"></textarea>
            <label for="tone-sharing-pack-image">Pack Image (optional)</label>
            <input id="tone-sharing-pack-image" type="file" accept="image/*" />
          </div>
          <div class="tone-sharing-pack-items-section">
            <div class="tone-sharing-pack-items-header">
              <span class="tone-sharing-label">My Published Presets</span>
              <span class="tone-sharing-status" id="tone-sharing-pack-items-hint">Check presets to include in this pack</span>
            </div>
            <div class="tone-sharing-select-list" id="tone-sharing-pack-items"></div>
          </div>
          <div class="tone-sharing-status" id="tone-sharing-pack-status"></div>
          <div class="tone-sharing-progress" id="tone-sharing-pack-progress" style="display: none;">
            <span class="tone-sharing-progress-spinner" aria-hidden="true"></span>
            <span class="tone-sharing-progress-label">Publishing pack...</span>
          </div>
        </div>
        <div class="modal-footer">
          <button id="tone-sharing-pack-modal-cancel" type="button" class="btn btn-secondary">Cancel</button>
          <button id="tone-sharing-save-pack-draft" type="button" class="btn btn-secondary">Save Draft</button>
          <button id="tone-sharing-create-pack" type="button" class="btn btn-primary">Publish Pack</button>
        </div>
      </div>
    </div>
