<div id="tone3000-details-modal" class="modal tone3000-details-modal" style="display: none;">
      <div class="modal-content tone3000-details-content">
        <div class="modal-header">
          <h3 id="tone3000-details-title">Tone Details</h3>
          <button class="tone3000-details-close" id="tone3000-details-close" title="Close tone details">×</button>
        </div>
        <div class="tone3000-details-body">
          <div class="tone3000-details-hero">
            <div class="tone3000-details-image" id="tone3000-details-image"></div>
            <div class="tone3000-details-meta" id="tone3000-details-meta"></div>
          </div>
          <div class="tone3000-details-section">
            <h4>Description</h4>
            <p id="tone3000-details-description"></p>
          </div>
          <div class="tone3000-details-section">
            <h4>Tags</h4>
            <div class="tone3000-details-tags" id="tone3000-details-tags"></div>
          </div>
          <div class="tone3000-details-section">
            <h4>Models</h4>
            <div class="tone3000-details-status" id="tone3000-details-models-status"></div>
            <div class="tone3000-details-controls">
              <div class="tone3000-details-select">
                <button class="btn btn-secondary tone3000-details-select-btn" id="tone3000-details-select-all" type="button">Select All</button>
                <button class="btn btn-secondary tone3000-details-select-btn" id="tone3000-details-select-none" type="button">Select None</button>
              </div>
              <div class="tone3000-details-import-actions">
                <button class="btn btn-secondary" id="tone3000-details-import-selected" type="button">Import Selected</button>
                <button class="btn btn-primary" id="tone3000-details-import-blend" type="button">Import &amp; Create Blend</button>
              </div>
            </div>
            <div class="tone3000-details-progress" id="tone3000-details-progress"></div>
            <ul class="tone3000-details-models" id="tone3000-details-models"></ul>
          </div>
        </div>
      </div>
    </div>
