<div id="tone3000-required-modal" class="modal" style="display: none;">
      <div class="modal-content tone-sharing-signin-modal-content">
        <div class="modal-header">
          <h3>Tone3000 API Key Required</h3>
          <button id="tone3000-required-close" class="modal-close" type="button">×</button>
        </div>
        <div class="modal-body">
          <p id="tone3000-required-message">This shared preset includes Tone3000 resources.</p>
          <p>You need your own Tone3000 API key before import can continue. Get one from <a href="https://www.tone3000.com" target="_blank" rel="noreferrer">tone3000.com</a>, under your account Settings (Legacy API Key), then paste it below.</p>
          <div class="tone-sharing-grid-form">
            <label for="tone3000-required-api-key">Tone3000 API Key</label>
            <input id="tone3000-required-api-key" type="password" placeholder="Enter your Tone3000 API key" />
          </div>
          <div class="tone-sharing-status" id="tone3000-required-status"></div>
        </div>
        <div class="modal-footer">
          <button id="tone3000-required-cancel" type="button" class="btn btn-secondary">Cancel Import</button>
          <button id="tone3000-required-open-settings" type="button" class="btn btn-secondary">Open Settings</button>
          <button id="tone3000-required-save" type="button" class="btn btn-primary">Save Key and Continue</button>
        </div>
      </div>
    </div>
