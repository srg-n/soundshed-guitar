        <div class="preset-library-popover" id="preset-library-popover" aria-hidden="true">
          <section class="preset-library" id="preset-library">
            <div class="preset-library-header">
              <div class="preset-library-tabs" role="tablist" style="display:none">
                <button id="preset-lib-tab-presets" type="button" class="preset-lib-tab active" role="tab" aria-selected="true" aria-controls="preset-library-presets-panel">Presets</button>
                <button id="preset-lib-tab-multi-rig" type="button" class="preset-lib-tab" role="tab" aria-selected="false" aria-controls="preset-library-multi-rig-panel">Multi-Rig</button>
              </div>
              <input type="text" id="preset-search" placeholder="Search presets..." />
              <div class="preset-library-actions">
                <button id="preset-export-folder-btn" type="button" class="preset-library-export-btn" title="Export presets" aria-label="Export presets">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 5 17 10" />
                    <line x1="12" y1="5" x2="12" y2="19" />
                  </svg>
                </button>
              </div>
              <button id="preset-library-close-btn" type="button" class="preset-library-close-btn" aria-label="Close preset selector" title="Close">×</button>
            </div>
            <div class="preset-tag-filter-bar" id="preset-tag-filter-bar" x-data>
              <template x-for="t in ($store.presetTags ? $store.presetTags.tags : [])" :key="t.tag">
                <button type="button" class="preset-tag-filter-chip"
                        :class="{ active: $store.presetTags && $store.presetTags.activeFilters.includes(t.tag) }"
                        :data-tag="t.tag"
                        x-on:click="$store.presetTags && $store.presetTags.toggle(t.tag)"
                        x-text="t.label"></button>
              </template>
            </div>
            <div class="preset-library-body" id="preset-library-presets-panel" role="tabpanel" aria-labelledby="preset-lib-tab-presets">
              <div class="preset-folder-tree" id="preset-folder-tree"></div>
              <div class="preset-list-column">
                <div class="preset-folder-toolbar" id="preset-folder-toolbar">
                  <input type="text" id="preset-folder-name" placeholder="New Folder Name" />
                  <button id="preset-folder-add" type="button" class="preset-folder-toolbar-btn" title="Create folder in current folder" aria-label="Create folder in current folder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                      <line x1="12" y1="10" x2="12" y2="16" />
                      <line x1="9" y1="13" x2="15" y2="13" />
                    </svg>
                  </button>
                  <button id="preset-folder-rename" type="button" class="preset-folder-toolbar-btn" title="Rename current folder" aria-label="Rename current folder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v3" />
                      <path d="M14 20h7" />
                      <path d="M16.5 6.5l3 3" />
                      <path d="M13 17l6.5-6.5a2.12 2.12 0 0 0-3-3L10 14v3z" />
                    </svg>
                  </button>
                  <button id="preset-folder-delete" type="button" class="preset-folder-toolbar-btn preset-folder-toolbar-btn-danger" title="Delete current folder" aria-label="Delete current folder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <polyline points="3 6 5 6 21 6" />
                      <path d="M8 6v-1a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1" />
                      <path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14" />
                      <line x1="10" y1="11" x2="10" y2="17" />
                      <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                  </button>
                </div>
                <div class="preset-list" id="preset-list"></div>
              </div>
            </div>

            <div class="preset-library-body preset-library-multi-rig-panel" id="preset-library-multi-rig-panel" role="tabpanel" aria-labelledby="preset-lib-tab-multi-rig" hidden>
              <div class="composite-preset-list" id="composite-preset-list"></div>
            </div>

            <div class="setlist-collapsible" id="setlist-collapsible">
              <button class="setlist-toggle" id="setlist-toggle" type="button" aria-expanded="false">
                Setlists
                <svg class="setlist-toggle-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </button>
              <div class="setlist-panel" id="setlist-panel" aria-hidden="true">
                <div class="setlist-header">
                  <input type="text" id="setlist-name-input" placeholder="New setlist name" />
                  <input type="number" id="setlist-bank-input" placeholder="Bank" min="0" step="1" />
                  <button id="setlist-add-btn" type="button">Create Setlist</button>
                </div>
                <div class="setlist-body">
                  <div class="setlist-list" id="setlist-list"></div>
                  <div class="setlist-editor">
                    <div class="setlist-editor-header" id="setlist-editor-header">Select a setlist</div>
                    <div class="setlist-slots" id="setlist-slots"></div>
                    <div class="setlist-hint">Drag presets here to add slots.</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
