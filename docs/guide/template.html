<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundshed Guitar - Docs</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .docs-layout {
            display: flex;
            min-height: 100vh;
            padding-top: 72px;
        }
        .docs-nav {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
            overflow-y: auto;
        }
        .docs-nav a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.35rem 0;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .docs-nav a:hover {
            color: var(--primary-color);
        }
        .docs-article {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 860px;
            color: var(--text-primary);
            line-height: 1.75;
        }
        .docs-article h1, .docs-article h2, .docs-article h3 {
            color: var(--text-primary);
            margin: 2rem 0 0.75rem;
        }
        .docs-article h1 { font-size: 2rem; }
        .docs-article h2 { font-size: 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.4rem; }
        .docs-article h3 { font-size: 1.1rem; color: var(--primary-color); }
        .docs-article p  { margin-bottom: 1rem; color: var(--text-secondary); }
        .docs-article code {
            background: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 0.15em 0.45em;
            font-size: 0.875em;
            color: var(--accent-color);
        }
        .docs-article pre {
            background: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1.25rem;
            overflow-x: auto;
            margin-bottom: 1.25rem;
        }
        .docs-article pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-primary);
        }
        .docs-article a { color: var(--primary-color); }
        .docs-article ul, .docs-article ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        .docs-article li { margin-bottom: 0.35rem; }
        .docs-article table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }
        .docs-article th {
            text-align: left;
            padding: 0.6rem 1rem;
            background: var(--bg-dark);
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .docs-article td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <a href="../index.html" style="text-decoration:none;">
                    <div class="brand-vertical">
                        <div class="brand-top">SOUNDSHED</div>
                        <div class="brand-bottom"><span class="brand-accent">GUITAR</span></div>
                    </div>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="/index.html#features">Features</a></li>
                <li><a href="/index.html#screenshots">Screenshots</a></li>
                <li><a href="/index.html#specs">Specs</a></li>
                <li><a href="/index.html#waitlist" class="nav-cta">Join Waitlist</a></li>
            </ul>
        </nav>
    </header>

    <div class="docs-layout">
        <nav class="docs-nav">
            <!--NAV-->
        </nav>
        <article class="docs-article">
            <!--CONTENT-->
        </article>
    </div>
</body>
</html>
