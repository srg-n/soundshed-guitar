<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neuron Guitar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Icon Bar -->
      <header class="icon-bar">
        <button class="icon-btn" title="Signal Chain">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="icon-btn" title="Input">
          <svg viewBox="0 0 24 24"><path d="M12 3v18M5 10l7-7 7 7" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="icon-btn" title="Amp">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="icon-btn active" title="Effects">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" title="EQ">
          <svg viewBox="0 0 24 24"><path d="M4 21v-7M12 21V3M20 21v-11" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="icon-btn" title="Reverb">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M4 12h16" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </header>

      <!-- Top Control Bar -->
      <section class="control-bar">
        <div class="control-bar-group">
          <div class="knob-control">
            <span class="knob-label">INPUT</span>
            <div class="knob" data-param="input" data-value="0">
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="input-value">0.0 dB</span>
          </div>

          <div class="toggle-control">
            <span class="toggle-label">GATE</span>
            <label class="toggle-switch">
              <input type="checkbox" id="gate-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="knob-control">
            <span class="knob-label">TRANSPOSE</span>
            <div class="knob" data-param="transpose" data-value="0">
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="transpose-value">0 st</span>
          </div>

          <div class="input-mode-control">
            <span class="mode-label">INPUT MODE</span>
            <div class="mode-options">
              <label><input type="radio" name="input-mode" value="stereo" /> Stereo</label>
              <label><input type="radio" name="input-mode" value="mono" checked /> Mono</label>
            </div>
          </div>
        </div>

        <div class="control-bar-group preset-group">
          <button class="nav-btn" id="prev-preset">←</button>
          <button class="nav-btn" id="next-preset">→</button>
          <button class="text-btn">EDIT</button>
          <button class="text-btn">DELETE</button>
          <button class="text-btn">SAVE</button>
          <button class="text-btn">SAVE AS...</button>
          <button class="menu-btn">⋮</button>

          <div class="preset-selector">
            <span class="preset-favorite">♡</span>
            <select id="preset-dropdown">
              <option>Default Preset</option>
            </select>
            <button class="folder-btn" title="Browse">📁</button>
          </div>
        </div>

        <div class="control-bar-group">
          <div class="toggle-control">
            <span class="toggle-label">DOUBLER</span>
            <label class="toggle-switch">
              <input type="checkbox" id="doubler-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="knob-control">
            <span class="knob-label">DELAY</span>
            <div class="knob" data-param="delay" data-value="6">
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="delay-value">6.00 ms</span>
          </div>

          <div class="knob-control">
            <span class="knob-label">OUTPUT</span>
            <div class="knob" data-param="output" data-value="0.5">
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="output-value">+0.5 dB</span>
          </div>
        </div>
      </section>

      <!-- Main Amp Display -->
      <main class="amp-display">
        <div class="amp-panel">
          <div class="amp-visualization">
            <!-- Placeholder for amp graphics -->
            <div class="amp-glow"></div>
          </div>

          <!-- Amp Knobs Row -->
          <div class="amp-knobs">
            <div class="amp-knob-control">
              <span class="amp-knob-label">INPUT</span>
              <div class="amp-knob" data-param="amp-input">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control voice-switch">
              <span class="amp-knob-label">VOICE</span>
              <div class="voice-toggle">
                <div class="voice-lever"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">GAIN</span>
              <div class="amp-knob" data-param="gain">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">BASS</span>
              <div class="amp-knob" data-param="bass">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">MIDDLE</span>
              <div class="amp-knob" data-param="middle">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">TREBLE</span>
              <div class="amp-knob" data-param="treble">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">PRESENCE</span>
              <div class="amp-knob" data-param="presence">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">MASTER</span>
              <div class="amp-knob" data-param="master">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control">
              <span class="amp-knob-label">OUTPUT</span>
              <div class="amp-knob" data-param="amp-output">
                <div class="knob-indicator"></div>
              </div>
            </div>
            <div class="amp-knob-control power-control">
              <span class="amp-knob-label">POWER</span>
              <div class="power-switch" id="power-switch">
                <div class="power-indicator"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Cab Section Icons -->
        <div class="cab-section">
          <button class="cab-btn" title="Cabinet 1">
            <div class="cab-icon cab-1x12"></div>
          </button>
          <button class="cab-btn active" title="Cabinet 2">
            <div class="cab-icon cab-2x12"></div>
          </button>
          <button class="cab-btn" title="Cabinet 3">
            <div class="cab-icon cab-4x12"></div>
          </button>
        </div>
      </main>

      <!-- Footer Bar -->
      <footer class="footer-bar">
        <button class="footer-btn">TUNER</button>
        <span class="footer-divider">|</span>
        <button class="footer-btn">MIDI</button>
        <span class="footer-divider">|</span>
        <button class="footer-btn">TAP</button>
        <span class="bpm-display">120.0 BPM ⟳</span>
        <span class="footer-divider">|</span>
        <button class="footer-btn">
          <span class="play-icon">▶</span> METRONOME
        </button>
        <span class="footer-divider">|</span>
        <button class="footer-btn">SETTINGS</button>
        <span class="footer-hint">[Click] to access the Cab Section · [R Click] or [Double Click] to activate/deactivate.</span>
      </footer>
    </div>
    <script src="main.js"></script>
  </body>
</html>
