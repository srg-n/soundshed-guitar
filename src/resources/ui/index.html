<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neron Guitar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Neuron</h1>
        <input id="preset-search" type="search" placeholder="Search presets" />
      </header>
      <main>
        <section id="preset-list"></section>
        <section id="inspector">
          <nav class="tabs">
            <button class="tab-button active" data-tab="details">Details</button>
            <button class="tab-button" data-tab="logs">Log</button>
          </nav>
          <div id="tab-contents">
            <div id="preset-details" class="tab-panel active"></div>
            <div id="log-panel" class="tab-panel"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="main.js"></script>
  </body>
</html>
