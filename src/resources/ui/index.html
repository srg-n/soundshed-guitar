<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neron Guitar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Neuron</h1>
        <input id="preset-search" type="search" placeholder="Search presets" />
      </header>
      <main>
        <section id="preset-list"></section>
        <section id="controls-panel">
          <h3>Controls</h3>
          <div class="control-group">
            <label for="control-mix">Mix</label>
            <input type="range" id="control-mix" min="0" max="1" step="0.01" value="1" />
            <span id="control-mix-value" class="control-value">100%</span>
          </div>
          <div class="control-group">
            <label for="control-drive">Drive</label>
            <input type="range" id="control-drive" min="0" max="1" step="0.01" value="0.5" />
            <span id="control-drive-value" class="control-value">50%</span>
          </div>
          <div class="control-group">
            <label for="control-output-trim">Output</label>
            <input type="range" id="control-output-trim" min="-24" max="12" step="0.1" value="0" />
            <span id="control-output-trim-value" class="control-value">0 dB</span>
          </div>
          <div class="control-group">
            <label for="control-tone">Tone</label>
            <input type="range" id="control-tone" min="0" max="1" step="0.01" value="0.5" />
            <span id="control-tone-value" class="control-value">50%</span>
          </div>
          <div class="control-group">
            <label for="control-input-trim">Input</label>
            <input type="range" id="control-input-trim" min="-24" max="12" step="0.1" value="0" />
            <span id="control-input-trim-value" class="control-value">0 dB</span>
          </div>
        </section>
        <section id="inspector">
          <nav class="tabs">
            <button class="tab-button active" data-tab="details">Details</button>
            <button class="tab-button" data-tab="logs">Log</button>
          </nav>
          <div id="tab-contents">
            <div id="preset-details" class="tab-panel active"></div>
            <div id="log-panel" class="tab-panel"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="main.js"></script>
  </body>
</html>
